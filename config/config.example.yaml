# Example config produced by the interview. Generated by build_config / `metagx build-config`,
# but hand-editable. Tool sections hold ONLY user params from the registries; managed
# flags (db, threads, input/output paths, --paired, --gzip-compressed) are added by the
# workflow automatically.

project: demo
outdir: results
threads: 8

# Either a TSV path or an inline list of records. Columns:
#   sample, r1, r2?, platform?, layout?, library?, group?, contigs?
#   contigs: path to a pre-assembled FASTA (isolate genome, a previous assembly, or downloaded
#            references). When set, the assembler is skipped and the contigs feed the
#            contig-consuming modules directly — e.g. run AMR screening on a genome you already
#            have with modules.functional + functional.amr (no reads or re-assembly needed).
#            A sample needs either r1 (reads) or contigs.
samples: samples.example.tsv

db:
  kraken2: local_databases/k2_standard
  bracken: local_databases/k2_standard   # defaults to kraken2 if omitted
  # cat: local_databases/cat_build/catdb  # optional: enables CAT contig cross-check in reconcile
  # domain-taxonomy reference DBs (only if modules.domain_taxonomy is on):
  # genomad: local_databases/genomad_db
  # checkv: local_databases/checkv_db
  # gtdbtk: local_databases/gtdbtk_db
  # checkm2: local_databases/checkm2_db
  # eukcc: local_databases/eukcc_db
  # functional layer DBs (only if modules.functional is on):
  # humann_nucleotide: local_databases/humann/chocophlan
  # humann_protein: local_databases/humann/uniref
  # amrfinderplus: local_databases/amrfinderplus_db
  # bakta: local_databases/bakta_db
  # eggnog: local_databases/eggnog_data
  # second-classifier consensus DBs (only if modules.classify_consensus is on):
  # metaphlan: local_databases/metaphlan_db   # classifier: metaphlan
  # kaiju: local_databases/kaiju_db            # classifier: kaiju (dir with nodes.dmp/names.dmp/*.fmi)
  # BGC mining DB (only if modules.bgc is on): download-antismash-databases --database-dir <path>
  # antismash: local_databases/antismash_db

modules:
  qc: true
  classify: true
  abundance: true
  assembly: false
  binning: false
  bin_refinement: false   # MaxBin2+CONCOCT -> DAS_Tool consensus -> dRep dereplication (needs binning)
  reconcile: false        # classify contigs + reconcile with read calls (needs assembly+classify)
  domain_taxonomy: false  # route contigs/bins to per-domain taxonomy+quality (see domains)
  stats: false            # cross-sample diversity (alpha/beta/PCoA, TSS+CLR); needs abundance + >=2 samples
  differential: false     # differential abundance between sample groups (CLR + permutation + BH FDR); needs abundance + a `group` column (>=2 labels, >=2 samples each)
  classify_consensus: false # cross-check kraken2 with a 2nd classifier (MetaPhlAn/Kaiju); needs classify
  functional: false       # functional layer; pick sub-steps under `functional:` below (WGS-only)
  bgc: false              # biosynthetic gene clusters on contigs (antiSMASH); needs assembly; WGS-only
  aggregate: false        # run-level MultiQC report + interactive Krona chart; needs classify
  strain: false           # inStrain strain-level SNV/microdiversity profiling; needs assembly
  damage: false           # ancient-DNA damage authentication (mapDamage2); needs assembly + library=ancient sample(s)
  decontam: false         # prevalence-based contaminant removal from negative controls; needs abundance + a control sample
  phylogenetics: false    # MAFFT → optional TrimAl → IQ-TREE 2 / FastTree from a FASTA (see phylogenetics block)

# Optional first-class host/contaminant removal before classification (SE; map + keep unmapped):
# host_removal: {genome: local_databases/host.fasta}
  filtered_assembly: false # filter reads by taxon, reassemble, compare vs unfiltered

# Taxonomic read filtering before assembly (only if modules.filtered_assembly is on).
# Default = depletion: remove these taxids, KEEP everything else incl. unclassified.
# mode: exclude (host/contaminant removal) | include (targeted; set keep_unclassified!).
# host_genome (optional): also do gold-standard mapping-based host depletion (minimap2).
read_filter:
  mode: exclude
  taxids: [9606]          # e.g. human host
  include_children: true
  keep_unclassified: true
  # host_genome: local_databases/host/GRCh38.fa

# Domains to resolve when domain_taxonomy is on. viral -> geNomad+CheckV;
# prokaryote -> GTDB-Tk+CheckM2 (needs binning); eukaryote -> EukRep+EukCC.
domains: [viral, prokaryote]

# Amplicon (marker-gene) samples — sample sheet column `library: amplicon` — are routed to
# primer trimming + OTU/abundance instead of assembly (assembly is WGS-only). Set primers:
amplicon:
  fwd_primer: GTGYCAGCMGCCGCGGTAA   # e.g. 515F (16S V4)
  rev_primer: GGACTACNVGGGTWTCTAAT  # e.g. 806R
  # method: otu                     # otu = VSEARCH 97% OTUs (default) | asv = DADA2 exact variants (short reads)
# vsearch: {cluster_id: 0.97}       # short-read amplicon OTUs
# dada2: {trunc_len_f: 240, trunc_len_r: 200, max_ee_f: 2.0, max_ee_r: 2.0}  # ASV (method: asv)
# emu needs a 16S DB: db.emu (long-read amplicon abundance)

# Differential abundance (only if modules.differential is on). Tests CLR-transformed Bracken
# counts between two `group` labels with a permutation test + Benjamini-Hochberg FDR.
# Needs a `group` column in the sample sheet (>=2 labels, >=2 samples each; more for power).
# differential:
#   group_column: group        # sample-sheet column holding the labels (default "group")
#   reference_group: control   # optional: clr_diff = mean(other) - mean(reference)
#   n_permutations: 999
#   fdr: 0.05

# Functional layer sub-steps (only if modules.functional is on). Each is independent so you can,
# e.g., screen a genome for AMR without HUMAnN's large DB. ABRicate ships its own AMR DBs (CARD/
# ResFinder/NCBI/...); AMRFinderPlus runs only if db.amrfinderplus is set.
# functional:
#   amr: true          # ABRicate (+ AMRFinderPlus if its db is set) on contigs  [default on]
#   pathways: false    # HUMAnN pathway abundance on reads (needs db.humann_*)   [default off]
#   annotation: false  # Bakta + eggNOG-mapper on bins (needs binning)           [default: binning]

# BGC mining tuning (only if modules.bgc is on). antiSMASH on assembled contigs.
# antismash: {taxon: bacteria, cb_general: true, cb_knownclusters: true}

# The "k-dense" confidence matrix: run classification at several values and compare.
# Omit this block to run a single classification at kraken2.confidence (or its default).
sweep:
  param: confidence
  values: [0.0, 0.1, 0.5]

fastp:
  qualified_quality_phred: 20
  length_required: 50
  cut_right: true

kraken2:
  minimum_hit_groups: 3
  minimum_base_quality: 10
  # NOTE: do not set `confidence` here while it is being swept above.

bracken:
  read_length: 150
  level: S
  threshold: 10

# Short-read assembler choice (only if modules.assembly is on). megahit (default, fast) or
# metaspades (accurate, paired-end only; supports hybrid when a sample carries long_reads).
# assembly:
#   assembler: metaspades
# metaspades: {memory_gb: 250}

# Second-classifier consensus (only if modules.classify_consensus is on).
# consensus:
#   classifier: metaphlan      # metaphlan (markers) | kaiju (protein)
# metaphlan: {stat_q: 0.2}
# kaiju: {min_match_length: 11, mismatches: 3}

# Functional layer tuning (only if modules.functional is on). AMR runs when assembly is on;
# MAG annotation runs when binning is on.
# abricate: {db: card, minid: 80, mincov: 80}
# amrfinderplus: {plus: true, coverage_min: 0.5}
# humann: {prescreen_threshold: 0.01}

# Bin refinement tuning (only if modules.bin_refinement is on).
# das_tool: {score_threshold: 0.5}
# drep: {completeness: 75, contamination: 25, s_ani: 0.95}

# Tier 3 tuning.
# strain (modules.strain): inStrain microdiversity / SNVs over the contigs+mapping.
# instrain: {min_cov: 5, min_freq: 0.05}
# ancient DNA (modules.damage): mark ancient samples with `library: ancient` in the sample
# sheet (short-read PE; fastp merges/collapses overlapping pairs first). mapDamage2 then
# quantifies C→T/G→A deamination; damage_ct_threshold is the authenticity cutoff.
# mapdamage: {length: 70}
# damage_ct_threshold: 0.05
# decontam (modules.decontam): mark negative/blank samples with `control: true`; taxa as/more
# prevalent in controls than in real samples are flagged and removed.
#
# phylogenetics (modules.phylogenetics): build a tree from marker genes, MAGs, or OTU/ASV reps.
# phylogenetics:
#   input: data/markers.fasta       # or aligned_input: data/aln.fasta to skip MAFFT
#   method: iqtree                   # iqtree | fasttree | auto (auto → FastTree if >500 seqs)
#   sequence_type: nt               # nt | aa
#   trim: true
# mafft: {method: auto}
# iqtree: {bootstrap: 1000, model: TEST}
# fasttree: {model: gtr}

# Per-sample Bracken read length: the kmer_distrib is length-specific, so mixed short+long runs
# need the right -r per sample (and the DB must have that databaseXmers built). Priority:
# sample-sheet `bracken_read_length` column > this per-platform map > bracken.read_length.
# bracken_read_length_by_platform: {illumina: 150, ont: 1000}

# Sample-sheet extra columns (TSV or inline records), all optional:
#   library: wgs | amplicon | ancient        long_reads / long_platform: hybrid metaSPAdes
#   control: true (negative/blank, decontam)  bracken_read_length: per-sample Bracken -r
#   group: <label> (e.g. case/control)       used by modules.differential
