# Parameter registry for VSEARCH (short-read amplicon OTU clustering). See kraken2.yaml.
tool: vsearch
command: vsearch
source_repo: https://github.com/torognes/vsearch
docs_url: https://github.com/torognes/vsearch
# no version_probe: vsearch prints its version to stderr and a citation to stdout, and the help
# capture prefers stdout — so no probe yields a parseable version here. Left absent (falls back
# to --help for flag capture) rather than recording a misleading one.
description: >
  Dereplicates, clusters, and chimera-filters short-read amplicon reads into OTUs (the
  appropriate analysis for marker-gene/amplicon data, where assembly does not apply).
params:
  cluster_id:
    flag: "--id"
    type: float
    default: 0.97
    min: 0.8
    max: 1.0
    tier: 1
    ask: true
    question: >
      OTU clustering identity (0.97 = classic 97% OTUs; use 1.0 / denoising for ASVs).
  minsize:
    flag: "--minsize"
    type: int
    default: 2
    min: 1
    tier: 2
    ask: false
    question: Minimum cluster size (drops singletons by default).
  threads:
    flag: "--threads"
    type: int
    managed: true
  # --- raw escape hatch: the long tail we don't model (passed verbatim, logged) ---
  extra_args:
    type: str
    default: ""
    tier: 3
    ask: false
    passthrough: true
    question: >
      Any additional raw vsearch command-line tokens, passed verbatim (escape hatch;
      not validated, recorded in run provenance).
