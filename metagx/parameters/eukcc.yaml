# Parameter registry for EukCC (eukaryotic genome/bin completeness). See kraken2.yaml.
tool: eukcc
command: eukcc
description: >
  Estimates completeness and contamination of eukaryotic genomes/bins recovered from
  metagenomes (the eukaryotic analogue of CheckM/CheckV).
params:
  threads:
    flag: "--threads"
    type: int
    managed: true
  # --- raw escape hatch: the long tail we don't model (passed verbatim, logged) ---
  extra_args:
    type: str
    default: ""
    tier: 3
    ask: false
    passthrough: true
    question: >
      Any additional raw eukcc command-line tokens, passed verbatim (escape hatch;
      not validated, recorded in run provenance).
