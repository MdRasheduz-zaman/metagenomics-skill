# Parameter registry for GTDB-Tk (prokaryotic bin/MAG taxonomy). See kraken2.yaml.
tool: gtdbtk
command: gtdbtk
description: >
  Genome-level taxonomic classification of bacterial/archaeal bins against the Genome
  Taxonomy Database (GTDB) using marker genes. Run on MetaBAT2 bins.
params:
  cpus:
    flag: "--cpus"
    type: int
    managed: true
  # --- raw escape hatch: the long tail we don't model (passed verbatim, logged) ---
  extra_args:
    type: str
    default: ""
    tier: 3
    ask: false
    passthrough: true
    question: >
      Any additional raw gtdbtk command-line tokens, passed verbatim (escape hatch;
      not validated, recorded in run provenance).
