# Parameter registry for IQ-TREE 2 (maximum likelihood phylogeny). See kraken2.yaml.
tool: iqtree
command: iqtree2
# IQ-TREE ships under version-suffixed binaries: v2 as `iqtree2`, v3 as `iqtree3`, and some builds
# as plain `iqtree`. Version/drift/provenance probing resolves across these (registry.resolve_command)
# so the installed one is detected — the workflow already resolves the same list at run time
# (workflow/scripts/phylogenetics.py:_iqtree_binary). Don't hardcode a single versioned binary.
command_candidates: [iqtree3, iqtree]
source_repo: https://github.com/iqtree/iqtree3
docs_url: http://www.iqtree.org/doc
description: >
  Maximum likelihood tree inference with automatic model selection (TEST) and ultrafast
  bootstrap. Default phylogenetics backend for <~2000 sequences.
params:
  model:
    flag: "-m"
    type: str
    default: TEST
    tier: 1
    ask: true
    question: >
      Substitution model. TEST lets IQ-TREE pick the best model; or specify (e.g. GTR+G4
      for DNA, LG+G4 for proteins).
    recommend:
      nt: TEST
      aa: TEST
      default: TEST
  bootstrap:
    flag: "-B"
    type: int
    default: 1000
    min: 0
    tier: 1
    ask: true
    question: Ultrafast bootstrap replicates (1000 recommended; 0 to skip).
    recommend:
      default: 1000
      quick: 100
      publication: 1000
  alrt:
    flag: "-alrt"
    type: int
    default: 0
    min: 0
    tier: 3
    ask: false
    question: SH-aLRT replicates (optional branch support; 0 = off).
  threads:
    flag: "-T"
    type: int
    managed: true
  prefix:
    flag: "--prefix"
    type: path
    managed: true
  alignment:
    flag: "-s"
    type: path
    managed: true
  redo:
    flag: "--redo"
    type: bool
    default: true
    tier: 3
    ask: false
  # --- raw escape hatch: the long tail we don't model (passed verbatim, logged) ---
  extra_args:
    type: str
    default: ""
    tier: 3
    ask: false
    passthrough: true
    question: >
      Any additional raw iqtree command-line tokens, passed verbatim (escape hatch;
      not validated, recorded in run provenance).
