# Parameter registry for geNomad (viral/plasmid identification + taxonomy). See kraken2.yaml.
tool: genomad
command: genomad
source_repo: https://github.com/apcamargo/genomad
docs_url: https://portal.nersc.gov/genomad/
version_probe: genomad --version
description: >
  Identifies viral and plasmid contigs in an assembly and assigns viral taxonomy (ICTV)
  via marker genes and a neural-network classifier. Used as the viral contig router.
params:
  min_score:
    flag: "--min-score"
    type: float
    default: 0.7
    min: 0.0
    max: 1.0
    tier: 1
    ask: true
    question: >
      Minimum virus/plasmid score (0-1) for a contig to be called. Higher = more precise,
      fewer calls. 0.7 is a common starting point.
  threads:
    flag: "--threads"
    type: int
    managed: true
  # --- raw escape hatch: the long tail we don't model (passed verbatim, logged) ---
  extra_args:
    type: str
    default: ""
    tier: 3
    ask: false
    passthrough: true
    question: >
      Any additional raw genomad command-line tokens, passed verbatim (escape hatch;
      not validated, recorded in run provenance).
