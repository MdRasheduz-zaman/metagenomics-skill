# Parameter registry for EukRep (eukaryotic vs prokaryotic contig separation). See kraken2.yaml.
tool: eukrep
command: EukRep
source_repo: https://github.com/patrickwest/EukRep
docs_url: https://github.com/patrickwest/EukRep
description: >
  Classifies assembled contigs as eukaryotic or prokaryotic, used to split a mixed
  metagenome before eukaryote-specific downstream analysis.
params:
  mode:
    flag: "-m"
    type: enum
    choices: ["strict", "balanced", "lenient"]
    default: "balanced"
    tier: 2
    ask: true
    question: >
      Stringency for calling a contig eukaryotic: strict (high precision), balanced
      (default), or lenient (high recall).
  min_length:
    flag: "--min"
    type: int
    default: 1000
    min: 0
    tier: 2
    ask: false
    question: Minimum contig length (bp) to classify.
  # --- raw escape hatch: the long tail we don't model (passed verbatim, logged) ---
  extra_args:
    type: str
    default: ""
    tier: 3
    ask: false
    passthrough: true
    question: >
      Any additional raw eukrep command-line tokens, passed verbatim (escape hatch;
      not validated, recorded in run provenance).
