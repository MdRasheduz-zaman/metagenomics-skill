# Parameter registry for MetaBAT2 (genome binning, optional). See kraken2.yaml.
tool: metabat2
command: metabat2
description: >
  Groups assembled contigs into draft genome bins (MAGs) using tetranucleotide
  frequency and coverage.
params:
  min_contig:
    flag: "-m"
    type: int
    default: 2500
    min: 1500
    tier: 1
    ask: true
    question: >
      Minimum contig length for binning (-m). Must be >= 1500; 2500 is the default.
      Larger = fewer, higher-confidence bins.
    recommend:
      default: 2500
      soil: 2500
      quick: 1500
  min_cls_size:
    flag: "-s"
    type: int
    default: 200000
    min: 0
    tier: 3
    ask: false
    question: Minimum size of an output bin (bp).
  max_edges:
    flag: "--maxEdges"
    type: int
    default: 200
    min: 1
    tier: 3
    ask: false
    question: Maximum number of edges per node; higher = more sensitive but slower.
  # --- managed by the workflow ---
  threads:
    flag: "-t"
    type: int
    managed: true
