# Parameter registry for FastTree (fast approximate ML phylogeny). See kraken2.yaml.
tool: fasttree
command: FastTree
description: >
  Fast approximate maximum-likelihood trees for large alignments (>500–1000 sequences).
  Used when phylogenetics.method is fasttree or sequence count exceeds iqtree threshold.
params:
  sequence_type:
    type: enum
    interpreted: true   # selects the FastTree alphabet flag (-nt) in the workflow script
    choices: [nt, aa]
    default: nt
    tier: 1
    ask: true
    question: Alignment alphabet — nucleotide (nt) or amino acid (aa).
    recommend:
      default: nt
      protein_marker: aa
  model:
    type: enum
    interpreted: true   # maps to a FastTree model flag in the workflow script (alphabet-dependent)
    choices: [gtr, jc, lg, wag, jtt]
    default: gtr
    tier: 2
    ask: true
    question: >
      For nt use gtr (recommended) or jc; for aa use lg, wag, or jtt.
    recommend:
      nt: gtr
      aa: lg
  # FastTree reads alignment path as positional arg; managed by workflow script.
  alignment:
    type: path
    managed: true
  # --- raw escape hatch: the long tail we don't model (passed verbatim, logged) ---
  extra_args:
    type: str
    default: ""
    tier: 3
    ask: false
    passthrough: true
    question: >
      Any additional raw fasttree command-line tokens, passed verbatim (escape hatch;
      not validated, recorded in run provenance).
