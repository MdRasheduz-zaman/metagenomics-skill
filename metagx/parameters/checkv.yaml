# Parameter registry for CheckV (viral genome completeness/contamination). See kraken2.yaml.
tool: checkv
command: checkv
description: >
  Assesses quality, completeness, and contamination of metagenome-assembled viral genomes
  (the viral analogue of CheckM). Run on viral contigs from geNomad.
params:
  threads:
    flag: "-t"
    type: int
    managed: true
  # --- raw escape hatch: the long tail we don't model (passed verbatim, logged) ---
  extra_args:
    type: str
    default: ""
    tier: 3
    ask: false
    passthrough: true
    question: >
      Any additional raw checkv command-line tokens, passed verbatim (escape hatch;
      not validated, recorded in run provenance).
