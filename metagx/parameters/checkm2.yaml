# Parameter registry for CheckM2 (prokaryotic bin completeness/contamination). See kraken2.yaml.
tool: checkm2
command: checkm2
description: >
  Machine-learning estimation of completeness and contamination for bacterial/archaeal
  bins (MAGs). Run on MetaBAT2 bins.
params:
  threads:
    flag: "--threads"
    type: int
    managed: true
  # --- raw escape hatch: the long tail we don't model (passed verbatim, logged) ---
  extra_args:
    type: str
    default: ""
    tier: 3
    ask: false
    passthrough: true
    question: >
      Any additional raw checkm2 command-line tokens, passed verbatim (escape hatch;
      not validated, recorded in run provenance).
