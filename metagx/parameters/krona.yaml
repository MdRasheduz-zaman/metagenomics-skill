# Parameter registry for Krona (interactive taxonomy charts from kraken2 reports). See kraken2.yaml.
tool: krona
command: ktImportText
source_repo: https://github.com/marbl/Krona
docs_url: https://github.com/marbl/Krona/wiki
description: >
  Renders kraken2 reports as an interactive, zoomable multi-layered pie chart (one HTML file,
  all samples) for exploring community composition by clade. Fed via kreport2krona text (the
  kreport's own indented lineage), so it needs NO Krona/NCBI taxonomy database and works with
  custom kraken2 DBs whose synthetic taxids are absent from NCBI — unlike ktImportTaxonomy.
params:
  # --- managed by the workflow ---
  output:
    flag: "-o"
    type: path
    managed: true
  # --- modeled but quiet (ask: false): reachable, not pushed ---
  name:
    flag: "-n"
    type: str
    default: ""
    tier: 3
    ask: false
    question: Label for the chart's root node (defaults to "all" / "Root").
  combine:
    flag: "-c"
    type: bool
    default: false
    tier: 3
    ask: false
    question: >
      Combine all input datasets into a single chart instead of one switchable dataset
      per sample.
  # --- raw escape hatch: the long tail we don't model (passed verbatim, logged) ---
  extra_args:
    type: str
    default: ""
    tier: 3
    ask: false
    passthrough: true
    question: >
      Any additional raw krona command-line tokens, passed verbatim (escape hatch;
      not validated, recorded in run provenance).
