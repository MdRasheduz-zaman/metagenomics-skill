# Parameter registry for MultiQC (aggregate QC + tool reports into one HTML). See kraken2.yaml.
tool: multiqc
command: multiqc
source_repo: https://github.com/MultiQC/MultiQC
docs_url: https://multiqc.info/docs/
version_probe: multiqc --version
description: >
  Scans the results directory and aggregates per-sample reports (fastp, kraken2, and more)
  into a single interactive HTML report with read-flow accounting across all samples.
params:
  flat:
    flag: "--flat"
    type: bool
    default: false
    tier: 3
    ask: false
    question: Render static (flat) plots instead of interactive ones (smaller, print-friendly).
  zip_data_dir:
    flag: "--zip-data-dir"
    type: bool
    default: false
    tier: 3
    ask: false
    question: Compress the parsed-data directory MultiQC writes alongside the report.
  title:
    flag: "--title"
    type: str
    default: ""
    tier: 3
    ask: false
    question: Custom report title shown in the MultiQC HTML header.
  comment:
    flag: "--comment"
    type: str
    default: ""
    tier: 3
    ask: false
    question: Free-text comment embedded at the top of the report (e.g. run notes).
  fullnames:
    flag: "--fullnames"
    type: bool
    default: false
    tier: 3
    ask: false
    question: Keep full sample names instead of MultiQC's cleaned/shortened versions.
  # --- managed by the workflow ---
  outdir:
    flag: "-o"
    type: path
    managed: true
  filename:
    flag: "-n"
    type: str
    managed: true
  force:
    flag: "-f"
    type: bool
    managed: true
  # --- raw escape hatch: the long tail we don't model (passed verbatim, logged) ---
  extra_args:
    type: str
    default: ""
    tier: 3
    ask: false
    passthrough: true
    question: >
      Any additional raw multiqc command-line tokens, passed verbatim (escape hatch;
      not validated, recorded in run provenance).
