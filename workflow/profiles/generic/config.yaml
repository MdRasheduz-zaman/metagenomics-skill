# metagx GENERIC cluster profile — any scheduler not covered by slurm/lsf/sge/pbs
# (HTCondor, Moab/Maui, OAR, Flux, LoadLeveler, …).
#   metagx run --config config.yaml --executor generic
#
# Driven through the generic-cluster executor. Install the plugin first:
#   pip install snakemake-executor-plugin-cluster-generic
#
# REQUIRED EDIT: replace cluster-generic-submit-cmd below with your scheduler's submit
# command. Snakemake substitutes {threads}, {resources.mem_mb}, {resources.runtime}
# (minutes), and {rule}/{wildcards} per job. Examples:
#   HTCondor : "condor_submit_make ... "   (or a wrapper that prints the job id)
#   Moab     : "msub -l nodes=1:ppn={threads},mem={resources.mem_mb}mb,walltime=00:{resources.runtime}:00"
#   OAR      : "oarsub -l core={threads},walltime=00:{resources.runtime}:00"
# For reliable completion detection, also set cluster-generic-status-cmd to a script that
# prints "running"/"success"/"failed" for a given job id (see the Snakemake docs).

executor: cluster-generic
jobs: 64
use-conda: true
printshellcmds: true
rerun-incomplete: true
latency-wait: 60

default-resources:
  mem_mb: 8000
  runtime: 120              # minutes
  threads: 4

cluster-generic-submit-cmd:
  "REPLACE_WITH_YOUR_SUBMIT_COMMAND
   --cpus {threads} --mem {resources.mem_mb} --time {resources.runtime}"
# cluster-generic-status-cmd: "your_status_script.sh"
# cluster-generic-cancel-cmd: "your_cancel_command"

set-threads:
  kraken2: 16
  bracken: 4
  megahit: 16
  metaspades: 16
  flye: 16
  map_to_contigs: 16
  classify_contigs: 16
  gtdbtk: 16

set-resources:
  kraken2:
    mem_mb: 64000
    runtime: 240
  megahit:
    mem_mb: 48000
    runtime: 720
  flye:
    mem_mb: 64000
    runtime: 1440
  gtdbtk:
    mem_mb: 128000
    runtime: 720
