# metagx PBS profile — PBS Pro / TORQUE / OpenPBS (qsub).
#   metagx run --config config.yaml --executor pbs
#
# Driven through the generic-cluster executor (no native PBS plugin in Snakemake v8).
# Install the plugin first:
#   pip install snakemake-executor-plugin-cluster-generic
#
# EDIT for your site (marked <<<): the queue (-q) and — importantly — the -l resource
# syntax differs between PBS flavours:
#   TORQUE / OpenPBS:  -l nodes=1:ppn={threads} -l mem={resources.mem_mb}mb
#   PBS Pro:           -l select=1:ncpus={threads}:mem={resources.mem_mb}mb
# The TORQUE form is shown; switch the commented line for PBS Pro.

executor: cluster-generic
jobs: 64
use-conda: true
printshellcmds: true
rerun-incomplete: true
latency-wait: 60

default-resources:
  mem_mb: 8000
  runtime: 120              # minutes
  threads: 4

# <<< EDIT: replace CHANGE_ME_QUEUE with your queue name.
# PBS Pro alternative for the -l resource lines: swap
#   -l nodes=1:ppn={threads} -l mem={resources.mem_mb}mb
# for
#   -l select=1:ncpus={threads}:mem={resources.mem_mb}mb
# (Keep it a single line — do not add inline # comments inside this quoted string.)
cluster-generic-submit-cmd:
  "qsub -V -q CHANGE_ME_QUEUE -l nodes=1:ppn={threads} -l mem={resources.mem_mb}mb -l walltime=00:{resources.runtime}:00 -o .snakemake/pbs_logs/ -e .snakemake/pbs_logs/"
cluster-generic-cancel-cmd: "qdel"

set-threads:
  kraken2: 16
  bracken: 4
  fastp_pe: 8
  megahit: 16
  metaspades: 16
  flye: 16
  map_to_contigs: 16
  metabat2: 8
  classify_contigs: 16
  genomad: 16
  gtdbtk: 16

set-resources:
  kraken2:
    mem_mb: 64000
    runtime: 240
  classify_contigs:
    mem_mb: 64000
  megahit:
    mem_mb: 48000
    runtime: 720
  flye:
    mem_mb: 64000
    runtime: 1440
  gtdbtk:
    mem_mb: 128000
    runtime: 720
